<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>GuideRoom 音频测试</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f172a; color: #f1f5f9;
      font-family: -apple-system, 'PingFang SC', sans-serif;
      min-height: 100vh; padding: 40px 20px;
      display: flex; flex-direction: column; align-items: center;
    }
    h1 { font-size: 22px; margin-bottom: 6px; }
    .subtitle { color: #64748b; font-size: 13px; margin-bottom: 32px; text-align: center; }
    .card {
      background: rgba(255,255,255,0.06); border-radius: 16px;
      padding: 24px; width: 100%; max-width: 420px; margin-bottom: 16px;
    }
    h2 { font-size: 16px; color: #94a3b8; margin-bottom: 16px; }
    button {
      width: 100%; padding: 16px; border-radius: 100px; border: none;
      font-size: 15px; font-weight: bold; cursor: pointer; margin-bottom: 10px;
      transition: opacity 0.15s;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: #fff; color: #0f172a; }
    .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; }
    .btn-active { background: #1e3a5f; color: #fff; border: 2px solid #3b82f6; }
    .btn-danger { background: transparent; color: #ef4444; border: 2px solid rgba(239,68,68,0.4); }
    input {
      width: 100%; padding: 14px 18px; margin-bottom: 10px;
      background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.1);
      border-radius: 100px; color: #fff; font-size: 15px; outline: none;
    }
    input::placeholder { color: #475569; }
    .status {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px; background: rgba(255,255,255,0.04);
      border-radius: 12px; margin-bottom: 12px; font-size: 14px;
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .dot-green { background: #22c55e; }
    .dot-yellow { background: #f59e0b; animation: blink 1s infinite; }
    .dot-gray { background: #475569; }
    .dot-red { background: #ef4444; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .room-id-box {
      font-family: monospace; font-size: 12px; word-break: break-all;
      background: rgba(255,255,255,0.04); padding: 10px 14px;
      border-radius: 10px; margin-bottom: 10px; color: #94a3b8;
    }
    .share-link {
      font-size: 12px; color: #3b82f6; word-break: break-all;
      cursor: pointer; text-decoration: underline;
    }
    .share-hint { font-size: 11px; color: #475569; margin-top: 4px; margin-bottom: 12px; }
    .listener-count {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; font-size: 14px; color: #64748b;
    }
    .count-num { font-size: 28px; font-weight: bold; color: #f1f5f9; }
    audio { width: 100%; margin-top: 8px; border-radius: 8px; }
    .warn { font-size: 12px; color: #f59e0b; background: rgba(245,158,11,0.1);
      padding: 10px 14px; border-radius: 10px; margin-bottom: 12px; line-height: 1.5; }
    .hidden { display: none; }
  </style>
</head>
<body>

<h1>GuideRoom 音频测试</h1>
<p class="subtitle">浏览器端到端验证 WebSocket 音频中继</p>

<!-- 选择身份 -->
<div id="setup" class="card">
  <h2>选择你的身份</h2>
  <button class="btn-primary" onclick="initGuide()">我是导游（创建房间）</button>
  <input id="join-id" placeholder="听众：输入房间 ID" />
  <button class="btn-secondary" onclick="initListener()">加入收听（听众）</button>
</div>

<!-- 导游视图 -->
<div id="guide-view" class="hidden">
  <div class="card">
    <h2>导游控制台</h2>
    <div id="guide-status" class="status">
      <span class="dot dot-yellow"></span><span>创建房间中…</span>
    </div>
    <div id="room-id-box" class="room-id-box hidden"></div>
    <div id="share-box" class="hidden">
      <div class="share-link" id="share-link" onclick="copyShareLink()"></div>
      <div class="share-hint">点击复制听众链接，发给朋友直接打开</div>
    </div>
    <div class="warn" id="guide-warn" hidden>
      ⚠️ 听众需在你点击「开始讲话」之前连接，否则可能听不到开头
    </div>
    <button id="mic-btn" class="btn-secondary" onclick="toggleMic()" disabled>开始讲话</button>
    <button class="btn-danger" style="margin-top:4px" onclick="endRoom()">结束房间</button>
    <div class="listener-count">
      <span>当前收听人数</span>
      <span id="listener-count" class="count-num">0</span>
    </div>
  </div>
</div>

<!-- 听众视图 -->
<div id="listener-view" class="hidden">
  <div class="card">
    <h2>听众收听</h2>
    <div id="listener-status" class="status">
      <span class="dot dot-yellow"></span><span>连接中…</span>
    </div>
    <div id="listener-warn" class="warn hidden">
      ⚠️ 如果没有声音，请确认导游已开始讲话，且你在导游开麦之前就已连接
    </div>
    <button id="reconnect-btn" class="btn-secondary hidden" onclick="reconnectListener()">重新连接</button>
    <audio id="audio-player" autoplay playsinline style="display:none"></audio>
  </div>
</div>

<script>
const RELAY = 'https://guideroom.zengsg.dpdns.org';
const WS_BASE = RELAY.replace('https://', 'wss://');

// 检查 URL 参数，直接进入听众模式
(function () {
  const p = new URLSearchParams(location.search);
  const roomId = p.get('roomId');
  const role = p.get('role');
  if (roomId) document.getElementById('join-id').value = roomId;
  if (role === 'listener' && roomId) {
    document.getElementById('setup').classList.add('hidden');
    startListenerWithId(roomId);
  }
})();

/* ===== 导游端 ===== */

let guideWs = null;
let mediaRecorder = null;
let micStream = null;
let micOn = false;
let activeMimeType = '';

async function initGuide() {
  show('guide-view'); hide('setup');
  setStatus('guide', 'yellow', '创建房间中…');

  let room;
  try {
    const res = await fetch(RELAY + '/relay-api/rooms', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title: '测试房间' }),
    });
    room = await res.json();
  } catch (e) {
    setStatus('guide', 'red', '创建失败，请检查网络');
    return;
  }

  const idBox = document.getElementById('room-id-box');
  idBox.textContent = '房间 ID：' + room.roomId;
  show('room-id-box');

  const shareUrl = location.origin + location.pathname + '?role=listener&roomId=' + room.roomId;
  const shareEl = document.getElementById('share-link');
  shareEl.textContent = shareUrl;
  shareEl.dataset.url = shareUrl;
  show('share-box');

  connectGuideWs(room.roomId);
}

function connectGuideWs(roomId) {
  guideWs = new WebSocket(WS_BASE + '/relay-ws?roomId=' + roomId + '&role=guide');
  guideWs.onopen = () => {
    document.getElementById('mic-btn').disabled = false;
    document.getElementById('guide-warn').hidden = false;
    setStatus('guide', 'green', '已连接，点击「开始讲话」');
  };
  guideWs.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'listener_count') {
        document.getElementById('listener-count').textContent = msg.count;
      }
    } catch (_) {}
  };
  guideWs.onclose = () => setStatus('guide', 'gray', '连接已断开');
  guideWs.onerror = () => setStatus('guide', 'red', '连接错误');
}

async function toggleMic() {
  micOn ? stopMic() : await startMic();
}

async function startMic() {
  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  } catch (e) {
    alert('无法获取麦克风权限：' + e.message);
    return;
  }

  activeMimeType = ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg;codecs=opus']
    .find(t => MediaRecorder.isTypeSupported(t)) || '';

  if (!activeMimeType) {
    alert('当前浏览器不支持录音（建议使用 Chrome 或 Firefox）');
    micStream.getTracks().forEach(t => t.stop());
    return;
  }

  // 先通知听众端编码格式
  if (guideWs?.readyState === WebSocket.OPEN) {
    guideWs.send(JSON.stringify({ type: 'audio_init', mimeType: activeMimeType }));
  }

  mediaRecorder = new MediaRecorder(micStream, { mimeType: activeMimeType, audioBitsPerSecond: 48000 });
  mediaRecorder.ondataavailable = async (e) => {
    if (e.data.size > 0 && guideWs?.readyState === WebSocket.OPEN) {
      guideWs.send(await e.data.arrayBuffer());
    }
  };
  mediaRecorder.start(500);
  micOn = true;

  const btn = document.getElementById('mic-btn');
  btn.textContent = '停止讲话';
  btn.className = 'btn-active';
  document.getElementById('guide-warn').hidden = true;
  setStatus('guide', 'green', '录音广播中…');
}

function stopMic() {
  if (mediaRecorder) { mediaRecorder.stop(); mediaRecorder = null; }
  if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
  micOn = false;
  const btn = document.getElementById('mic-btn');
  btn.textContent = '开始讲话';
  btn.className = 'btn-secondary';
  setStatus('guide', 'green', '已暂停');
}

function endRoom() {
  stopMic();
  if (guideWs) { guideWs.close(); guideWs = null; }
  hide('guide-view');
  show('setup');
}

function copyShareLink() {
  const url = document.getElementById('share-link').dataset.url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => alert('已复制！\n\n' + url));
  } else {
    prompt('复制此链接：', url);
  }
}

/* ===== 听众端 ===== */

let listenerWs = null;
let mediaSource = null;
let sourceBuffer = null;
let chunkQueue = [];
let mseReady = false;
let currentRoomId = '';
let firstChunkPlayed = false;
let graceTimer = null;

function initListener() {
  const roomId = document.getElementById('join-id').value.trim();
  if (!roomId) { alert('请输入房间 ID'); return; }
  hide('setup');
  startListenerWithId(roomId);
}

function reconnectListener() {
  hide('reconnect-btn');
  if (listenerWs) { try { listenerWs.close(); } catch(_) {} listenerWs = null; }
  mediaSource = null; sourceBuffer = null; chunkQueue = []; mseReady = false; firstChunkPlayed = false;
  startListenerWithId(currentRoomId);
}

async function startListenerWithId(roomId) {
  currentRoomId = roomId;
  show('listener-view');
  setStatus('listener', 'yellow', '验证房间…');

  // Pre-check room existence before opening WebSocket
  try {
    const res = await fetch(RELAY + '/relay-api/rooms/' + roomId);
    if (!res.ok) {
      setStatus('listener', 'red', '房间不存在或已结束');
      return;
    }
    const room = await res.json();
    if (room.status !== 'active') {
      setStatus('listener', 'red', '房间已结束');
      return;
    }
  } catch (e) {
    setStatus('listener', 'red', '无法连接服务器：' + e.message);
    return;
  }

  setStatus('listener', 'yellow', '连接中…');

  listenerWs = new WebSocket(WS_BASE + '/relay-ws?roomId=' + roomId + '&role=listener');
  listenerWs.binaryType = 'arraybuffer';

  listenerWs.onopen = () => setStatus('listener', 'green', '已连接，等待导游开麦…');

  listenerWs.onmessage = (e) => {
    if (typeof e.data === 'string') {
      handleListenerText(e.data);
    } else {
      handleListenerAudio(e.data);
    }
  };

  listenerWs.onclose = (e) => {
    const statusText = document.getElementById('listener-status').textContent;
    if (!statusText.includes('结束')) {
      const reason = e.code === 4004 ? '房间不存在或已结束' : '连接已断开 (code ' + e.code + ')';
      setStatus('listener', 'gray', reason);
      show('reconnect-btn');
    }
  };
  listenerWs.onerror = () => {
    setStatus('listener', 'red', '连接错误，请检查网络');
    show('reconnect-btn');
  };
}

function handleListenerText(text) {
  try {
    const msg = JSON.parse(text);
    if (msg.type === 'audio_init') {
      setupMSE(msg.mimeType);
    } else if (msg.type === 'guide_disconnected') {
      startGraceCountdown(msg.expiresAt);
    } else if (msg.type === 'guide_reconnected') {
      stopGraceCountdown();
      setStatus('listener', 'green', '导游已重连，收听中…');
    } else if (msg.type === 'room_ended') {
      stopGraceCountdown();
      setStatus('listener', 'red', '导览已结束，感谢收听');
      hide('reconnect-btn');
      if (listenerWs) { listenerWs.close(); listenerWs = null; }
    }
  } catch (_) {}
}

function startGraceCountdown(expiresAt) {
  stopGraceCountdown();
  const expiry = new Date(expiresAt).getTime();
  function tick() {
    const remaining = Math.max(0, expiry - Date.now());
    const mins = Math.floor(remaining / 60000);
    const secs = Math.floor((remaining % 60000) / 1000);
    const t = mins + ':' + String(secs).padStart(2, '0');
    setStatus('listener', 'yellow', '导游暂时断线，请保持页面开启（' + t + ' 后自动结束）');
    if (remaining <= 0) stopGraceCountdown();
  }
  tick();
  graceTimer = setInterval(tick, 1000);
}

function stopGraceCountdown() {
  if (graceTimer) { clearInterval(graceTimer); graceTimer = null; }
}

function handleListenerAudio(buffer) {
  if (!mseReady) {
    // 浏览器直接发来的 audio/webm，猜测格式并初始化 MSE
    show('listener-warn');
    setupMSE('audio/webm;codecs=opus');
  }
  chunkQueue.push(buffer);
  flushQueue();
  setStatus('listener', 'green', '收听中…');
}

function setupMSE(mimeType) {
  if (mseReady) return;

  const audio = document.getElementById('audio-player');
  mediaSource = new MediaSource();
  audio.src = URL.createObjectURL(mediaSource);

  mediaSource.addEventListener('sourceopen', () => {
    try {
      sourceBuffer = mediaSource.addSourceBuffer(mimeType);
      sourceBuffer.mode = 'sequence';
      sourceBuffer.addEventListener('updateend', flushQueue);
      mseReady = true;
      flushQueue();
    } catch (e) {
      setStatus('listener', 'red', '不支持的音频格式，请换用 Chrome');
    }
  });
}

function flushQueue() {
  if (!sourceBuffer || sourceBuffer.updating || chunkQueue.length === 0) return;
  const chunk = chunkQueue.shift();
  try {
    sourceBuffer.appendBuffer(chunk);
    // Trigger play on first chunk arriving — user already interacted by clicking 加入收听
    if (!firstChunkPlayed) {
      firstChunkPlayed = true;
      const audio = document.getElementById('audio-player');
      audio.play().catch(() => {});
    }
  } catch (e) {
    if (e.name === 'QuotaExceededError' && sourceBuffer.buffered.length > 0) {
      const end = sourceBuffer.buffered.end(0);
      sourceBuffer.remove(0, Math.max(0, end - 10));
    }
  }
}

/* ===== 工具函数 ===== */

function show(id) { document.getElementById(id).classList.remove('hidden'); }
function hide(id) { document.getElementById(id).classList.add('hidden'); }

function setStatus(who, color, text) {
  const el = document.getElementById(who + '-status');
  el.innerHTML = `<span class="dot dot-${color}"></span><span>${text}</span>`;
}
</script>
</body>
</html>
