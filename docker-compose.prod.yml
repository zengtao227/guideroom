services:
  web:
    build:
      context: .
      args:
        NEXT_PUBLIC_APP_URL: https://guideroom.zengsg.dpdns.org
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      NODE_ENV: production
      LIVEKIT_URL: ${LIVEKIT_URL}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      GUIDEROOM_ROOM_STORE_PATH: /app/data/rooms.json
    volumes:
      - guideroom_data:/app/data
    restart: unless-stopped

volumes:
  guideroom_data:
